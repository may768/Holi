<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
   <title>Happy Holi 2026 </title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;600&display=swap');
       
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
           -webkit-tap-highlight-color: transparent;
       }
       
       html, body {
           overflow: hidden;
           width: 100%;
           height: 100%;
           background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
           font-family: 'Poppins', sans-serif;
           touch-action: none;
       }
       
       #canvas-container {
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           z-index: 1;
       }
       
       .ui-layer {
           position: fixed;
           top: 0;
           left: 0;
           width: 100%;
           height: 100%;
           z-index: 10;
           pointer-events: none;
           display: flex;
           flex-direction: column;
           justify-content: center;
           align-items: center;
           padding: 20px;
       }
       
       .main-title {
           font-family: 'Playfair Display', serif;
           font-size: clamp(2.5rem, 12vw, 8rem);
           font-weight: 900;
           background: linear-gradient(45deg, #ff006e, #fb5607, #ffbe0b, #8338ec, #3a86ff);
           background-size: 300% 300%;
           -webkit-background-clip: text;
           -webkit-text-fill-color: transparent;
           background-clip: text;
           animation: gradientShift 4s ease infinite, float 3s ease-in-out infinite;
           text-shadow: 0 0 60px rgba(255, 0, 110, 0.5);
           letter-spacing: -2px;
           transform-style: preserve-3d;
           text-align: center;
           line-height: 1.1;
       }
       
       .year-badge {
           font-family: 'Poppins', sans-serif;
           font-size: clamp(1.2rem, 5vw, 3rem);
           font-weight: 600;
           color: #fff;
           background: rgba(255, 255, 255, 0.1);
           backdrop-filter: blur(10px);
           padding: 0.5rem 1.5rem;
           border-radius: 50px;
           border: 2px solid rgba(255, 255, 255, 0.2);
           margin-top: 1rem;
           animation: pulse 2s ease-in-out infinite;
           box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
           text-align: center;
       }
       
       .subtitle {
           color: rgba(255, 255, 255, 0.8);
           font-size: clamp(0.9rem, 3vw, 1.5rem);
           margin-top: 1.5rem;
           text-align: center;
           max-width: 600px;
           line-height: 1.6;
           animation: fadeInUp 1s ease-out 0.5s both;
           padding: 0 20px;
       }
       
       .interactive-hint {
           position: fixed;
           bottom: 1.5rem;
           left: 50%;
           transform: translateX(-50%);
           color: rgba(255, 255, 255, 0.6);
           font-size: clamp(0.8rem, 2.5vw, 0.9rem);
           animation: bounce 2s infinite;
           z-index: 20;
           text-align: center;
           width: 100%;
           padding: 0 20px;
       }
       
       .touch-indicator {
           position: fixed;
           width: 60px;
           height: 60px;
           border-radius: 50%;
           background: rgba(255, 255, 255, 0.3);
           pointer-events: none;
           z-index: 15;
           transform: translate(-50%, -50%) scale(0);
           transition: transform 0.1s ease-out;
           display: none;
       }
       
       .touch-indicator.active {
           display: block;
           transform: translate(-50%, -50%) scale(1);
           animation: touchPulse 0.6s ease-out forwards;
       }
       
       @keyframes gradientShift {
           0%, 100% { background-position: 0% 50%; }
           50% { background-position: 100% 50%; }
       }
       
       @keyframes float {
           0%, 100% { transform: translateY(0px) rotateX(0deg); }
           50% { transform: translateY(-15px) rotateX(3deg); }
       }
       
       @keyframes pulse {
           0%, 100% { transform: scale(1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
           50% { transform: scale(1.05); box-shadow: 0 12px 40px rgba(255, 0, 110, 0.4); }
       }
       
       @keyframes fadeInUp {
           from { opacity: 0; transform: translateY(30px); }
           to { opacity: 1; transform: translateY(0); }
       }
       
       @keyframes bounce {
           0%, 100% { transform: translateX(-50%) translateY(0); }
           50% { transform: translateX(-50%) translateY(-10px); }
       }
       
       @keyframes touchPulse {
           0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
           100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
       }
       
       .color-burst {
           position: absolute;
           width: 80px;
           height: 80px;
           border-radius: 50%;
           pointer-events: none;
           mix-blend-mode: screen;
           animation: burst 0.8s ease-out forwards;
       }
       
       @keyframes burst {
           0% { transform: scale(0); opacity: 1; }
           100% { transform: scale(3); opacity: 0; }
       }
       
       /* Mobile optimizations */
       @media (max-width: 768px) {
           .main-title {
               letter-spacing: -1px;
           }
           
           .year-badge {
               padding: 0.4rem 1.2rem;
           }
           
           .color-burst {
               width: 60px;
               height: 60px;
           }
       }
       
       /* Landscape mode adjustments */
       @media (max-height: 500px) and (orientation: landscape) {
           .main-title {
               font-size: clamp(2rem, 10vh, 4rem);
           }
           
           .year-badge {
               font-size: 1rem;
               margin-top: 0.5rem;
           }
           
           .subtitle {
               margin-top: 0.5rem;
               font-size: 0.8rem;
           }
       }
   </style>
</head>
<body>

   <div id="canvas-container"></div>
   
   <div class="ui-layer">
       <h1 class="main-title">Happy Holi</h1>
       <div class="year-badge">2026</div>
       <p class="subtitle">
           Festival of Colors<br>
   
       </p>
   </div>
   
  
   
   <div class="touch-indicator" id="touchIndicator"></div>

   <script>
       // Three.js Scene Setup with mobile optimizations
       const scene = new THREE.Scene();
       scene.fog = new THREE.FogExp2(0x1a1a2e, 0.002);
       
       const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
       camera.position.z = 40;
       
       const renderer = new THREE.WebGLRenderer({ 
           antialias: window.devicePixelRatio < 2, // Disable antialias on high DPI mobile
           alpha: true,
           powerPreference: "high-performance"
       });
       renderer.setSize(window.innerWidth, window.innerHeight);
       renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Limit pixel ratio
       document.getElementById('canvas-container').appendChild(renderer.domElement);
       
       // Mobile detection
       const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
       
       // Lighting
       const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
       scene.add(ambientLight);
       
       const pointLight1 = new THREE.PointLight(0xff006e, 1.5, 80);
       pointLight1.position.set(15, 15, 15);
       scene.add(pointLight1);
       
       const pointLight2 = new THREE.PointLight(0x00d9ff, 1.5, 80);
       pointLight2.position.set(-15, -15, 15);
       scene.add(pointLight2);
       
       const pointLight3 = new THREE.PointLight(0xffbe0b, 1.5, 80);
       pointLight3.position.set(0, 20, 10);
       scene.add(pointLight3);
       
       // Adjusted particle count for mobile
       const particleCount = isMobile ? 1500 : 3000;
       const particles = new THREE.BufferGeometry();
       const positions = new Float32Array(particleCount * 3);
       const colors = new Float32Array(particleCount * 3);
       const velocities = new Float32Array(particleCount * 3);
       const sizes = new Float32Array(particleCount);
       
       const colorPalette = [
           new THREE.Color(0xff006e),
           new THREE.Color(0xfb5607),
           new THREE.Color(0xffbe0b),
           new THREE.Color(0x8338ec),
           new THREE.Color(0x3a86ff),
           new THREE.Color(0x06ffa5),
           new THREE.Color(0xff1744)
       ];
       
       for (let i = 0; i < particleCount; i++) {
           const radius = Math.random() * 30 + 8;
           const theta = Math.random() * Math.PI * 2;
           const phi = Math.random() * Math.PI;
           
           positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
           positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
           positions[i * 3 + 2] = radius * Math.cos(phi);
           
           const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
           colors[i * 3] = color.r;
           colors[i * 3 + 1] = color.g;
           colors[i * 3 + 2] = color.b;
           
           velocities[i * 3] = (Math.random() - 0.5) * 0.15;
           velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.15;
           velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.15;
           
           sizes[i] = Math.random() * 2.5 + 0.5;
       }
       
       particles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
       particles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
       particles.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
       
       const particleMaterial = new THREE.ShaderMaterial({
           uniforms: {
               time: { value: 0 },
               mouse: { value: new THREE.Vector2(0, 0) }
           },
           vertexShader: `
               attribute float size;
               varying vec3 vColor;
               uniform float time;
               uniform vec2 mouse;
               
               void main() {
                   vColor = color;
                   vec3 pos = position;
                   
                   pos.x += sin(time * 0.5 + position.y * 0.1) * 1.5;
                   pos.y += cos(time * 0.3 + position.x * 0.1) * 1.5;
                   pos.z += sin(time * 0.4 + position.z * 0.1) * 1.5;
                   
                   float dist = distance(pos.xy, mouse * 40.0);
                   if (dist < 15.0) {
                       pos.z += 8.0 * (1.0 - dist / 15.0);
                   }
                   
                   vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                   gl_PointSize = size * (200.0 / -mvPosition.z);
                   gl_Position = projectionMatrix * mvPosition;
               }
           `,
           fragmentShader: `
               varying vec3 vColor;
               
               void main() {
                   float dist = distance(gl_PointCoord, vec2(0.5));
                   if (dist > 0.5) discard;
                   
                   float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                   gl_FragColor = vec4(vColor, alpha * 0.8);
               }
           `,
           transparent: true,
           vertexColors: true,
           blending: THREE.AdditiveBlending,
           depthWrite: false
       });
       
       const particleSystem = new THREE.Points(particles, particleMaterial);
       scene.add(particleSystem);
       
       // Floating spheres - reduced count for mobile
       const spheres = [];
       const sphereCount = isMobile ? 8 : 15;
       const sphereGeometry = new THREE.SphereGeometry(1, 24, 24);
       
       for (let i = 0; i < sphereCount; i++) {
           const material = new THREE.MeshPhongMaterial({
               color: colorPalette[i % colorPalette.length],
               emissive: colorPalette[i % colorPalette.length],
               emissiveIntensity: 0.4,
               shininess: 80,
               transparent: true,
               opacity: 0.85
           });
           
           const sphere = new THREE.Mesh(sphereGeometry, material);
           sphere.position.set(
               (Math.random() - 0.5) * 50,
               (Math.random() - 0.5) * 35,
               (Math.random() - 0.5) * 25
           );
           sphere.scale.setScalar(Math.random() * 1.5 + 0.5);
           
           sphere.userData = {
               velocity: new THREE.Vector3(
                   (Math.random() - 0.5) * 0.08,
                   (Math.random() - 0.5) * 0.08,
                   (Math.random() - 0.5) * 0.08
               ),
               rotationSpeed: new THREE.Vector3(
                   Math.random() * 0.015,
                   Math.random() * 0.015,
                   Math.random() * 0.015
               )
           };
           
           spheres.push(sphere);
           scene.add(sphere);
       }
       
       // Touch/Mouse tracking
       let mouseX = 0;
       let mouseY = 0;
       let targetMouseX = 0;
       let targetMouseY = 0;
       let isTouching = false;
       
       // Mouse events
       document.addEventListener('mousemove', (event) => {
           if (!isTouching) {
               targetMouseX = (event.clientX / window.innerWidth) * 2 - 1;
               targetMouseY = -(event.clientY / window.innerHeight) * 2 + 1;
           }
       });
       
       // Touch events
       document.addEventListener('touchstart', (event) => {
           isTouching = true;
           const touch = event.touches[0];
           targetMouseX = (touch.clientX / window.innerWidth) * 2 - 1;
           targetMouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
           
           showTouchIndicator(touch.clientX, touch.clientY);
           createColorBurst(touch.clientX, touch.clientY);
           explodeParticles();
       }, { passive: true });
       
       document.addEventListener('touchmove', (event) => {
           event.preventDefault();
           const touch = event.touches[0];
           targetMouseX = (touch.clientX / window.innerWidth) * 2 - 1;
           targetMouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
       }, { passive: false });
       
       document.addEventListener('touchend', () => {
           setTimeout(() => { isTouching = false; }, 100);
       });
       
       // Click/Tap to burst
       document.addEventListener('click', (event) => {
           if (!isTouching) {
               createColorBurst(event.clientX, event.clientY);
               explodeParticles();
           }
       });
       
       function showTouchIndicator(x, y) {
           const indicator = document.getElementById('touchIndicator');
           indicator.style.left = x + 'px';
           indicator.style.top = y + 'px';
           indicator.classList.add('active');
           setTimeout(() => indicator.classList.remove('active'), 600);
       }
       
       function explodeParticles() {
           for (let i = 0; i < particleCount; i++) {
               const idx = i * 3;
               const x = positions[idx];
               const y = positions[idx + 1];
               const z = positions[idx + 2];
               
               const dist = Math.sqrt(x*x + y*y + z*z);
               if (dist < 12) {
                   velocities[idx] = (Math.random() - 0.5) * 1.5;
                   velocities[idx + 1] = (Math.random() - 0.5) * 1.5;
                   velocities[idx + 2] = (Math.random() - 0.5) * 1.5;
               }
           }
           particles.attributes.position.needsUpdate = true;
       }
       
       function createColorBurst(x, y) {
           const burst = document.createElement('div');
           burst.className = 'color-burst';
           const color = colorPalette[Math.floor(Math.random() * colorPalette.length)];
           burst.style.background = `radial-gradient(circle, #${color.getHexString()} 0%, transparent 70%)`;
           burst.style.left = (x - 40) + 'px';
           burst.style.top = (y - 40) + 'px';
           document.body.appendChild(burst);
           
           setTimeout(() => burst.remove(), 800);
       }
       
       // Animation Loop with frame skipping for mobile
       const clock = new THREE.Clock();
       let frameCount = 0;
       
       function animate() {
           requestAnimationFrame(animate);
           
           // Skip frames on mobile for performance
           if (isMobile) {
               frameCount++;
               if (frameCount % 2 !== 0) return;
           }
           
           const time = clock.getElapsedTime();
           
           mouseX += (targetMouseX - mouseX) * 0.08;
           mouseY += (targetMouseY - mouseY) * 0.08;
           
           particleMaterial.uniforms.time.value = time;
           particleMaterial.uniforms.mouse.value.set(mouseX, mouseY);
           
           particleSystem.rotation.y = time * 0.08;
           particleSystem.rotation.x = Math.sin(time * 0.15) * 0.08;
           
           const positions = particles.attributes.position.array;
           for (let i = 0; i < particleCount; i++) {
               const idx = i * 3;
               
               positions[idx] += velocities[idx];
               positions[idx + 1] += velocities[idx + 1];
               positions[idx + 2] += velocities[idx + 2];
               
               velocities[idx] *= 0.985;
               velocities[idx + 1] *= 0.985;
               velocities[idx + 2] *= 0.985;
               
               if (Math.abs(positions[idx]) > 40) velocities[idx] *= -1;
               if (Math.abs(positions[idx + 1]) > 35) velocities[idx + 1] *= -1;
               if (Math.abs(positions[idx + 2]) > 25) velocities[idx + 2] *= -1;
           }
           particles.attributes.position.needsUpdate = true;
           
           spheres.forEach((sphere, i) => {
               sphere.position.add(sphere.userData.velocity);
               sphere.rotation.x += sphere.userData.rotationSpeed.x;
               sphere.rotation.y += sphere.userData.rotationSpeed.y;
               
               const dx = mouseX * 25 - sphere.position.x;
               const dy = mouseY * 18 - sphere.position.y;
               sphere.userData.velocity.x += dx * 0.0008;
               sphere.userData.velocity.y += dy * 0.0008;
               
               if (Math.abs(sphere.position.x) > 35) sphere.userData.velocity.x *= -1;
               if (Math.abs(sphere.position.y) > 25) sphere.userData.velocity.y *= -1;
               if (Math.abs(sphere.position.z) > 15) sphere.userData.velocity.z *= -1;
               
               const scale = sphere.scale.x + Math.sin(time * 1.5 + i) * 0.008;
               sphere.scale.setScalar(Math.max(0.5, scale));
           });
           
           camera.position.x = Math.sin(time * 0.25) * 4;
           camera.position.y = Math.cos(time * 0.18) * 3;
           camera.lookAt(scene.position);
           
           pointLight1.position.x = Math.sin(time * 0.8) * 25;
           pointLight1.position.z = Math.cos(time * 0.8) * 25;
           pointLight2.position.y = Math.sin(time * 1.2) * 15;
           
           renderer.render(scene, camera);
       }
       
       // Handle resize with debounce
       let resizeTimeout;
       window.addEventListener('resize', () => {
           clearTimeout(resizeTimeout);
           resizeTimeout = setTimeout(() => {
               camera.aspect = window.innerWidth / window.innerHeight;
               camera.updateProjectionMatrix();
               renderer.setSize(window.innerWidth, window.innerHeight);
           }, 200);
       });
       
       // Visibility check to pause when hidden
       document.addEventListener('visibilitychange', () => {
           if (document.hidden) {
               clock.stop();
           } else {
               clock.start();
           }
       });
       
       animate();
       
       // Auto-burst with reduced frequency on mobile
       const burstInterval = isMobile ? 3000 : 2000;
       setInterval(() => {
           if (Math.random() > 0.6) {
               const x = Math.random() * window.innerWidth;
               const y = Math.random() * window.innerHeight;
               createColorBurst(x, y);
           }
       }, burstInterval);
   </script>
</body>
</html>
